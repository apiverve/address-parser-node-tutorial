<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Street Address Parser | APIVerve Tutorial</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      padding: 40px 20px;
      color: #e0e0e0;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 30px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 18px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      font-size: 1rem;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #4dabf7;
    }

    input::placeholder {
      color: #666;
    }

    button {
      padding: 14px 28px;
      background: linear-gradient(135deg, #4dabf7 0%, #228be6 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(77, 171, 247, 0.3);
    }

    button:disabled {
      background: #555;
      cursor: not-allowed;
      transform: none;
    }

    .examples {
      margin-bottom: 25px;
    }

    .examples h3 {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 10px;
    }

    .example-addresses {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .example-btn {
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #aaa;
      font-size: 0.85rem;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-btn:hover {
      background: rgba(77, 171, 247, 0.2);
      border-color: #4dabf7;
      color: #4dabf7;
    }

    .result {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .result.show {
      display: block;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .original-address {
      background: rgba(0, 0, 0, 0.3);
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-family: monospace;
      color: #4dabf7;
    }

    .parsed-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
    }

    .parsed-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 15px;
      border-radius: 10px;
      border-left: 3px solid #4dabf7;
    }

    .parsed-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }

    .parsed-value {
      font-size: 1.1rem;
      color: #fff;
      font-weight: 500;
    }

    .parsed-value.empty {
      color: #555;
      font-style: italic;
    }

    .error {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      color: #ff6b6b;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #888;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #555;
      font-size: 0.9rem;
    }

    .footer a {
      color: #4dabf7;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Street Address Parser</h1>
    <p class="subtitle">Parse any US address into structured components</p>

    <div class="card">
      <div class="input-group">
        <input type="text" id="addressInput" placeholder="Enter a street address...">
        <button id="parseBtn" onclick="parseAddress()">Parse</button>
      </div>

      <div class="examples">
        <h3>Try these examples:</h3>
        <div class="example-addresses">
          <button class="example-btn" onclick="setExample('1600 Amphitheatre Parkway, Mountain View, CA 94043')">Google HQ</button>
          <button class="example-btn" onclick="setExample('350 Fifth Avenue, New York, NY 10118')">Empire State</button>
          <button class="example-btn" onclick="setExample('1 Infinite Loop, Cupertino, CA 95014')">Apple HQ</button>
          <button class="example-btn" onclick="setExample('233 S Wacker Dr, Chicago, IL 60606')">Willis Tower</button>
        </div>
      </div>

      <div id="result" class="result"></div>
    </div>

    <p class="footer">
      Powered by <a href="https://apiverve.com/marketplace/streetaddressparser" target="_blank">APIVerve Street Address Parser API</a>
    </p>
  </div>

  <script>
    const input = document.getElementById('addressInput');
    const resultDiv = document.getElementById('result');

    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') parseAddress();
    });

    function setExample(address) {
      input.value = address;
      parseAddress();
    }

    async function parseAddress() {
      const address = input.value.trim();
      if (!address) return;

      const btn = document.getElementById('parseBtn');
      btn.disabled = true;
      btn.textContent = 'Parsing...';

      resultDiv.innerHTML = '<div class="loading">Parsing address...</div>';
      resultDiv.classList.add('show');

      try {
        const response = await fetch(`/api/parse?address=${encodeURIComponent(address)}`);
        const result = await response.json();

        if (result.status === 'ok') {
          displayResult(result.data);
        } else {
          showError(result.error || 'Failed to parse address');
        }
      } catch (error) {
        showError('Failed to connect to the server');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Parse';
      }
    }

    function displayResult(data) {
      const parsed = data.parsed;
      const fields = [
        { label: 'Street Number', value: parsed.streetNumber },
        { label: 'Street Name', value: parsed.streetAddress },
        { label: 'Street Type', value: parsed.streetType },
        { label: 'City', value: parsed.cityName },
        { label: 'State', value: parsed.stateName },
        { label: 'ZIP Code', value: parsed.zipCode }
      ];

      let html = `
        <div class="original-address">${data.address}</div>
        <div class="parsed-grid">
      `;

      fields.forEach(field => {
        const isEmpty = !field.value;
        html += `
          <div class="parsed-item">
            <div class="parsed-label">${field.label}</div>
            <div class="parsed-value ${isEmpty ? 'empty' : ''}">${field.value || 'Not found'}</div>
          </div>
        `;
      });

      html += '</div>';
      resultDiv.innerHTML = html;
      resultDiv.classList.add('show');
    }

    function showError(message) {
      resultDiv.innerHTML = `<div class="error">${message}</div>`;
      resultDiv.classList.add('show');
    }
  </script>
</body>
</html>
